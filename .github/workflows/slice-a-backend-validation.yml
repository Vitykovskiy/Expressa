name: Slice A Backend Validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  backend-tests:
    name: backend-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test

      - name: Build backend container image
        run: docker build -t expressa-backend:ci -f backend/Dockerfile .
