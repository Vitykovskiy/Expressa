name: Slice B Frontend Validation Path

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  ci-slice-b-frontend:
    name: ci-slice-b-frontend
    runs-on: ubuntu-latest
    env:
      BACKEND_IMAGE: traefik/whoami:v1.10.1
      FRONTEND_IMAGE: expressa-frontend:ci
      POSTGRES_PASSWORD: sliceb_ci_password
      ADMIN_TELEGRAM_ID: "1"
      DISABLE_TG_AUTH: "true"
      BACKEND_PORT: "18081"
      FRONTEND_PORT: "18082"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build frontend bundle
        working-directory: frontend
        run: npm run build

      - name: Build frontend container image
        run: |
          set -euo pipefail
          docker build -t "${FRONTEND_IMAGE}" -f frontend/Dockerfile frontend

      - name: Validate scripts syntax
        run: |
          set -euo pipefail
          bash -n infra/vps/deploy-slice-b-runtime.sh
          bash -n infra/validation/run-smoke.sh
          bash -n infra/validation/run-frontend-smoke.sh
          bash -n infra/validation/run-e2e.sh

      - name: Validate Slice B compose
        run: |
          set -euo pipefail
          docker compose -f infra/staging/docker-compose.slice-b.yml config >/dev/null

      - name: Start local slice-b runtime path
        run: |
          set -euo pipefail
          docker compose -f infra/staging/docker-compose.slice-b.yml up -d

      - name: Run frontend smoke entrypoint
        run: |
          set -euo pipefail
          chmod +x infra/validation/run-frontend-smoke.sh
          infra/validation/run-frontend-smoke.sh "http://127.0.0.1:${FRONTEND_PORT}"

      - name: Stop local slice-b runtime path
        if: always()
        run: |
          set -euo pipefail
          docker compose -f infra/staging/docker-compose.slice-b.yml down -v

  publish-slice-b-images:
    name: publish-slice-b-images
    runs-on: ubuntu-latest
    needs: [ci-slice-b-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    env:
      BACKEND_IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/expressa-backend
      FRONTEND_IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/expressa-frontend
      IMAGE_TAG: slice-b-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image references
        run: |
          set -euo pipefail
          BACKEND_IMAGE_REPOSITORY_LOWER="$(echo "${BACKEND_IMAGE_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          FRONTEND_IMAGE_REPOSITORY_LOWER="$(echo "${FRONTEND_IMAGE_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "BACKEND_IMAGE=${BACKEND_IMAGE_REPOSITORY_LOWER}:${IMAGE_TAG}" >> "${GITHUB_ENV}"
          echo "FRONTEND_IMAGE=${FRONTEND_IMAGE_REPOSITORY_LOWER}:${IMAGE_TAG}" >> "${GITHUB_ENV}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}
