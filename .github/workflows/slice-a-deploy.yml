name: Slice A Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "infra/**"
      - ".github/workflows/slice-a-deploy.yml"

permissions:
  contents: read
  packages: write

jobs:
  deploy-slice-a:
    name: deploy-slice-a
    runs-on: ubuntu-latest
    environment: staging
    env:
      IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/expressa-backend
      IMAGE_TAG: slice-a-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image reference
        run: |
          set -euo pipefail
          IMAGE_REPOSITORY_LOWER="$(echo "${IMAGE_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "BACKEND_IMAGE=${IMAGE_REPOSITORY_LOWER}:${IMAGE_TAG}" >> "${GITHUB_ENV}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}

      - name: Copy deploy assets to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_ROOT_USER }}
          password: ${{ secrets.VPS_ROOT_PASSWORD }}
          source: "infra/staging/docker-compose.slice-a.yml,infra/vps/deploy-slice-a-runtime.sh"
          target: "/tmp/expressa-slice-a-deploy"

      - name: Deploy Slice A runtime on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          ADMIN_TELEGRAM_ID: ${{ secrets.ADMIN_TELEGRAM_ID }}
          DISABLE_TG_AUTH: ${{ secrets.DISABLE_TG_AUTH }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_ROOT_USER }}
          password: ${{ secrets.VPS_ROOT_PASSWORD }}
          script_stop: true
          command_timeout: 30m
          envs: ADMIN_TELEGRAM_ID,DISABLE_TG_AUTH,POSTGRES_PASSWORD,BACKEND_IMAGE,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            chmod +x /tmp/expressa-slice-a-deploy/infra/vps/deploy-slice-a-runtime.sh
            ADMIN_TELEGRAM_ID="${ADMIN_TELEGRAM_ID}" DISABLE_TG_AUTH="${DISABLE_TG_AUTH}" POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" /tmp/expressa-slice-a-deploy/infra/vps/deploy-slice-a-runtime.sh /tmp/expressa-slice-a-deploy/infra/staging/docker-compose.slice-a.yml "${BACKEND_IMAGE}"
            curl -fsS "http://127.0.0.1:18081/healthz" >/dev/null
            docker compose -f /opt/expressa/staging/slice-a/docker-compose.slice-a.yml --env-file /opt/expressa/staging/slice-a/.env ps
            docker logout ghcr.io || true
