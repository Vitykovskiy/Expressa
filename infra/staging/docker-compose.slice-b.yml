services:
  postgres:
    image: postgres:16-alpine
    container_name: expressa-sliceb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-expressa}
      POSTGRES_USER: ${POSTGRES_USER:-expressa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - expressa-sliceb-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-expressa} -d ${POSTGRES_DB:-expressa}"]
      interval: 10s
      timeout: 5s
      retries: 6

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    container_name: expressa-sliceb-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMIN_TELEGRAM_ID: ${ADMIN_TELEGRAM_ID:?ADMIN_TELEGRAM_ID is required}
      DISABLE_TG_AUTH: ${DISABLE_TG_AUTH:?DISABLE_TG_AUTH is required}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-expressa}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-expressa}}
      PORT: ${BACKEND_INTERNAL_PORT:-80}
    ports:
      - "${BACKEND_PORT:-18081}:${BACKEND_INTERNAL_PORT:-80}"

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE is required}
    container_name: expressa-sliceb-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-18082}:80"

volumes:
  expressa-sliceb-postgres-data:
